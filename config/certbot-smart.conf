# =============================================================================
# certbot-smart-manager — Configuration File
# =============================================================================
# Path: /etc/certbot-smart-manager/certbot-smart.conf
# Permissions: 600 (root:root)
# =============================================================================
#
# This file is sourced by the certbot-smart-manager scripts.
# All values can be overridden via environment variables.
#
# =============================================================================

# ---------------------------------------------------------------------------
# RENEWAL THRESHOLDS
# ---------------------------------------------------------------------------
# Number of days before expiry to attempt renewal
THRESHOLD_DAYS="${THRESHOLD_DAYS:-30}"

# Critical threshold — sends WARNING-level notifications
CRITICAL_THRESHOLD_DAYS="${CRITICAL_THRESHOLD_DAYS:-7}"

# ---------------------------------------------------------------------------
# LOGGING
# ---------------------------------------------------------------------------
LOG_FILE="${LOG_FILE:-/var/log/certbot-smart-manager.log}"
LOG_LEVEL="${LOG_LEVEL:-INFO}"   # DEBUG | INFO | WARNING | ERROR

# ---------------------------------------------------------------------------
# BACKUP SETTINGS
# ---------------------------------------------------------------------------
BACKUP_ENABLED="${BACKUP_ENABLED:-true}"
BACKUP_DIR="${BACKUP_DIR:-/var/backups/certbot-smart-manager}"
BACKUP_RETENTION_DAYS="${BACKUP_RETENTION_DAYS:-30}"

# ---------------------------------------------------------------------------
# NOTIFICATION METHOD
# ---------------------------------------------------------------------------
# Priority order: email > console > log
# Available methods: email, console, log, telegram, slack, all
NOTIFICATION_METHOD="${NOTIFICATION_METHOD:-console}"

# ---------------------------------------------------------------------------
# EMAIL (SMTP) SETTINGS
# ---------------------------------------------------------------------------
# Used when NOTIFICATION_METHOD=email or NOTIFICATION_METHOD=all
SMTP_SERVER="${SMTP_SERVER:-}"
SMTP_PORT="${SMTP_PORT:-587}"
SMTP_USER="${SMTP_USER:-}"
SMTP_PASS="${SMTP_PASS:-}"
SMTP_FROM="${SMTP_FROM:-}"
SMTP_TO="${SMTP_TO:-}"
SMTP_USE_TLS="${SMTP_USE_TLS:-true}"

# ---------------------------------------------------------------------------
# TELEGRAM NOTIFICATION SETTINGS
# ---------------------------------------------------------------------------
# Used when NOTIFICATION_METHOD=telegram or NOTIFICATION_METHOD=all
TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-}"
TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID:-}"

# ---------------------------------------------------------------------------
# SLACK NOTIFICATION SETTINGS
# ---------------------------------------------------------------------------
# Used when NOTIFICATION_METHOD=slack or NOTIFICATION_METHOD=all
SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL:-}"

# ---------------------------------------------------------------------------
# WEB SERVER BEHAVIOR
# ---------------------------------------------------------------------------
# Reload web server after successful certificate renewal
RELOAD_WEB_SERVER="${RELOAD_WEB_SERVER:-true}"

# ---------------------------------------------------------------------------
# CERTBOT OPTIONS
# ---------------------------------------------------------------------------
CERTBOT_EXTRA_ARGS="${CERTBOT_EXTRA_ARGS:-}"  # Extra flags passed to certbot

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
CERTBOT_RENEWAL_DIR="${CERTBOT_RENEWAL_DIR:-/etc/letsencrypt/renewal}"
CERTBOT_LIVE_DIR="${CERTBOT_LIVE_DIR:-/etc/letsencrypt/live}"
CERTBOT_ARCHIVE_DIR="${CERTBOT_ARCHIVE_DIR:-/etc/letsencrypt/archive}"
LOCK_FILE="${LOCK_FILE:-/var/lock/certbot-smart-manager.lock}"

# ---------------------------------------------------------------------------
# SYSTEM
# ---------------------------------------------------------------------------
CLEANUP_LOCK_ON_EXIT="${CLEANUP_LOCK_ON_EXIT:-true}"
MAX_RETRIES="${MAX_RETRIES:-3}"
RETRY_DELAY_SECONDS="${RETRY_DELAY_SECONDS:-10}"